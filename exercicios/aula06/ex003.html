<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            background-color: blue;
        }
    </style>

<body>
    <h1>Olá, mundo!</h1>
    <script>
        var n1 = Number.parseInt(window.prompt('Digite um número: '))
        var n2 = Number.parseInt(window.prompt('Digite outro número: '))
        var soma = n1 + n2
        window.alert('A soma dos valores é ' + soma)

        var nome = window.prompt('Qual é o seu nome?')
        var idade = window.prompt('Qual é a sua idade?')
        var nota = Number.parseFloat(window.prompt('Qual é a sua nota?'))
        var disciplina = window.prompt('Qual é a disciplina?')
       window.alert(`O aluno ${nome} com idade de ${idade} anos tirou nota ${nota} na disciplina de ${disciplina}`)//
    </script>
</body>

</html>
