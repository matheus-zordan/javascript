<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 20pt Arial;
            background-color: lightcyan;
        }
    </style>
</head>

<body>
    <h1>Testanto formatação de strings e números</h1>
    <script>
        var nome = window.prompt('Qual é o seu nome?')
        document.write(`Olá ${nome}. Seu nome tem ${nome.length} letras.<br>`)
        document.write(`Seu nome em maiusculo fica: ${nome.toUpperCase()}<br>`)
        document.write(`Seu nome todo minusculo fica: ${nome.toLowerCase()}<br>`)
        var num = parseFloat(window.prompt('Informe um salario aleatório: <br>'))
        document.write('Valor informado com o símbolo diversas moedas:<br>')
        document.write(`${num.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}<br>`)
        document.write(`${num.toLocaleString('pt-br', { style: 'currency', currency: 'USD' })}<br>`)
        document.write(`${num.toLocaleString('pt-br', { style: 'currency', currency: 'EUR' })}<br>`)
    </script>
</body>

</html>
