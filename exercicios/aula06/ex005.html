<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
    <style>
        body {
            background-color: black;
            color: white;
            font: normal 20px arial;
        }
    </style>
</head>

<body>
    <h1>Iniciando estudos DOM</h1>
    <p>Aqui vai o resultado</p>
    <p>aprendendo a usar o <strong>DOM</strong></p>
    <div id="msg">Clique em mim</div>
    <p class="teste">Paragráfo de teste querySelector</p>
    <script>
        var p1 = document.getElementsByTagName("p")[0]
        document.write(p1.innerHTML)

        var d = document.getElementById("msg")
        d.style.color = "red"
        d.style.background = "white"

        var seletor = document.querySelector('p.teste')
        seletor.style.color = 'red'
        seletor.innerHTML = 'este texto foi alterado utlizado querySelector'
    </script>
</body>

</html>
