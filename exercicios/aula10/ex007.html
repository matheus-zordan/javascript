<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números </title>
    <style>
        body{
            background-color: lightcyan;
        }
        #container{
            display: flex;
            width: 30%;
            margin: 0 auto; 
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="filhos">
            <h1>Somando Valores</h1>
            <input type="number" name="txtn1" id="txtn1"> +
            <input type="number" name="txtn2" id="txtn2">
            <input type="button" value="Somar" onclick="somar()">
            <div id="res">
                Resultado
            </div>
        </div>
    </div>
    <div id="container">
        <div id="filhos">
            <h1>Subtraindo Valores</h1>
            <input type="number" name="txtn3" id="txtn3"> -
            <input type="number" name="txtn4" id="txtn4">
            <input type="button" value="Subtrair" onclick="subtrair()">
            <div id="res2">
                Resultado
            </div>
        </div>
    </div>

    <script>
        function somar() {
            var tn1 = document.getElementById('txtn1')
            var tn2 = document.getElementById('txtn2')
            var res = document.getElementById('res')
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var s = n1 + n2
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a ${s}`
        }
    </script>
        <script>
            function subtrair() {
                var tn3 = document.getElementById('txtn3')
                var tn4 = document.getElementById('txtn4')
                var res = document.getElementById('res2')
                var n3 = Number(tn3.value)
                var n4 = Number(tn4.value)
                var sub = n3 - n4
                res.innerHTML = `A subtração entre ${n3} e ${n4} é igual a ${sub}`
            }
        </script>
</body>

</html>
