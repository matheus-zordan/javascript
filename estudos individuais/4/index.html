<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudando o DOM</title>
</head>

<body>
    <h1>Olá</h1>
    <p id="paragrafo">

    </p>
    <h3 class="texto">

    </h3>

    <p>
        <label for="fname">Primeiro Nome</label>
        <input type="text" name="fname">
        <label for="fname">Segundo Nome</label>
        <input type="text" name="fname">
    </p>
    <p id="demo">

    </p>

    <p id="demo2">

    </p>

    <p id="demo3">

    </p>

    <div>

    </div>

    <div id="pai">
        <div id="filho">
            Esse é um paragrafo filho
        </div>
    </div>

    <ul id="minhaLista">
        <li id="item1">Item antigo</li>
        <li id="item2">Item 2</li>
        <li id="item3">Item 3</li>
    </ul>

    <div id="container">
        Conteudo atual
    </div>


    <script>
        //Testando o getElementById
        document.getElementById("paragrafo").innerHTML = "Estou escrevedo esse paragrafo utilizando o getElementById"

        //Testando o getElementByClass
        var p = document.getElementsByClassName("texto")
        p[0].innerHTML = "Estou escrevendo esse parágrafo com o getElementsByClassName"

        //Testando o getElementByName
        var elemento = document.getElementsByName("fname")
        document.getElementById("demo").innerHTML = elemento[0].tagName

        var elemento2 = document.getElementsByName("fname").length
        document.getElementById("demo2").innerHTML = elemento2

        //TEstando o getElementByTagName
        var d = document.getElementsByTagName("p")
        for (var i = 0; i < d.length; i++) {
            d[i].style.color = "red"
        }
        var divisao = document.getElementsByTagName("div")[0]
        divisao.innerHTML = 'teste'
        divisao.style.color = "green"
        divisao.style.background = "black"
        divisao.style.fontSize = "50px"

        //Testando o removeChild
        var pai = document.getElementById("pai")
        var filho = document.getElementById("filho")
        pai.removeChild(filho)

        //Testando o createElement
        var novoParagrafo = document.createElement("p")
        novoParagrafo.innerHTML = "novo paragrafo criado"
        var pai = document.getElementById("pai")
        pai.appendChild(novoParagrafo)

        //Testando o replaceChild
        var novoItem = document.createElement("li")
        novoItem.innerHTML = "novo item"
        var lista = document.getElementById("minhaLista")
        var itemASubstituir = document.getElementById("item1")
        lista.replaceChild(novoItem, itemASubstituir)

        //Testando o innerHTML
        var pegando = document.getElementById("container")
        pegando.innerHTML = 'Meu novo conteúdo'
        pegando.innerHTML += '<br>adicionando mais conteudo'

        //Testando o style
        var estilo = document.getElementById("container")
        estilo.style.backgroundColor = "red"
        estilo.style.fontSize = "25px"
        estilo.style.border = "2px solid black"
    </script>
</body>

</html>
