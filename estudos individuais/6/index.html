<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppendChild</title>
</head>

<body>
    <h1>Estudando AppendChild</h1>
    <ul id="lista">
        <li>Morango</li>
        <li>Maca</li>
        <li>Uva</li>
        <li>Banana</li>
        <li>Laranja</li>
    </ul>
    <button onclick="adicionar()">Clique aqui para adiconar um novo elemento na lista</button>
    <ul id="lista2">
        <li>Pera</li>
        <li>Morango</li>
        <li>Gilo</li>
        <li>Mamão</li>
        <li>Abacate</li>
    </ul>
    <button onclick="mover()">Clique aqui para mover as frutas dessa lista para a de cima</button>

    <ul id="lista3">
        <li>Flamengo</li>
        <li>Basco</li>
        <li>Chororo</li>
        <li>Filho</li>
    </ul>
    <script>
        function adicionar() { //nessa função, estamos adicionando uma novo elemento a lista 1
            var novaLista = document.createElement("li")
            var novoItem = document.createTextNode("Limão")
            novaLista.appendChild(novoItem)
            document.getElementById("lista").appendChild(novaLista)
        }

        function mover(){ //nessa função, estamos movendo o ultimo elemento da lista 2 para a lista 1
            var movedora = document.getElementById("lista2").lastElementChild // Pode tambem usar o firstElementChild
            document.getElementById("lista").appendChild(movedora)
        }

        function inserindoAntes(){
            
        }
    </script>
</body>

</html>
