<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppendChild</title>
    <style>

    </style>
</head>

<body onclick="elementoAtivo()">
    <h1>Estudando AppendChild</h1>
    <ul id="lista">
        <li>Morango</li>
        <li>Maca</li>
        <li>Uva</li>
        <li>Banana</li>
        <li>Laranja</li>
    </ul>
    <button onclick="adicionar()">Clique aqui para adiconar um novo elemento na lista</button>
    <ul id="lista2">
        <li>Pera</li>
        <li>Morango</li>
        <li>Gilo</li>
        <li>Mamão</li>
        <li>Abacate</li>
    </ul>
    <button onclick="mover()">Clique aqui para mover as frutas dessa lista para a de cima</button>

    <ul id="lista3">
        <li>Flamengo</li>
        <li>Basco</li>
        <li>Chororo</li>
        <li>Filho</li>
    </ul>
    <button onclick="inserindoAntes()">Clique aqui</button>
    <div id="elemento">
        <h1>Testando a propriedade activeElement.</h1>
        <p>Ela é uma propriedade de leitura, e retorna o elemento ativo.</p>
        <button>Clique aqui ou em qualquer lugar da página</button>
        <input type="checkbox" name="" id="">
        <a href="#">Clique Aqui</a>
    </div>
    <p id="demo">

    </p>

    <script>
        //nessa função, estamos adicionando uma novo elemento a lista 1. 
        //Com o appendChild, o elemento sempre sera inserido como o ultimo filho
        function adicionar() {
            var novaLista = document.createElement("li")
            var novoItem = document.createTextNode("Limão")
            novaLista.appendChild(novoItem)
            document.getElementById("lista").appendChild(novaLista)
        }

        function mover() { //nessa função, estamos movendo o ultimo elemento da lista 2 para a lista 1
            var movedora = document.getElementById("lista2").lastElementChild // Pode tambem usar o firstElementChild
            document.getElementById("lista").appendChild(movedora)
        }

        function inserindoAntes() { //nessa função, estamos inserindo uma palavra na posição 0 da lista. Caso queiramos adiconar em outra posição, so mudar o valor.
            var newList = document.getElementById("li")
            var newText = document.createTextNode("Campeonato Carioca")
            var list = document.getElementById("lista3")
            list.insertBefore(newText, list.children[0])
        }

        function elementoAtivo() {
            var ativo = document.activeElement.tagName
            document.getElementById("demo").innerHTML = ativo
        }
    </script>
</body>

</html>
